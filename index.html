<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abundancia PIR ✨</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = Recharts;

        const App = () => {
            const [income, setIncome] = useState(1600);
            const [expenses, setExpenses] = useState({ coche: 450, casa: 200, ocio: 200 });
            const surplus = income - Object.values(expenses).reduce((a, b) => a + b, 0);

            useEffect(() => { lucide.createIcons(); }, []);

            return (
                <div className="max-w-md mx-auto p-6 space-y-6 font-sans">
                    <div className="bg-indigo-900 text-white p-6 rounded-3xl shadow-xl">
                        <h1 className="text-xl font-bold flex items-center gap-2">Mi Abundancia PIR <i data-lucide="sparkles"></i></h1>
                        <div className="mt-4 flex justify-between bg-white/10 p-4 rounded-2xl">
                            <div><p className="text-[10px] opacity-60">AHORRO</p><p className="text-2xl font-bold">{surplus}€</p></div>
                            <div className="text-right"><p className="text-[10px] opacity-60">TASA</p><p className="text-2xl font-bold">{((surplus/income)*100).toFixed(0)}%</p></div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                        <h2 className="font-bold text-slate-700 flex items-center gap-2"><i data-lucide="wallet"></i> Ajustar Presupuesto</h2>
                        <div>
                            <label className="text-xs font-bold text-slate-400">INGRESOS: {income}€</label>
                            <input type="range" min="1000" max="3000" step="50" value={income} onChange={(e) => setIncome(Number(e.target.value))} className="w-full h-2 bg-indigo-100 rounded-lg appearance-none accent-indigo-600" />
                        </div>
                        {Object.keys(expenses).map(k => (
                            <div key={k}>
                                <label className="text-[10px] font-bold text-slate-400 uppercase">{k}: {expenses[k]}€</label>
                                <input type="range" min="0" max="600" step="10" value={expenses[k]} onChange={(e) => setExpenses({...expenses, [k]: Number(e.target.value)})} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none accent-slate-400" />
                            </div>
                        ))}
                    </div>

                    <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                        <h3 className="font-bold text-emerald-800 text-sm mb-2 italic">"Págate a ti mismo primero"</h3>
                        <p className="text-xs text-emerald-600 leading-relaxed text-justify">
                            Según Babilonia, debes separar {Math.round(income * 0.1)}€ nada más cobrar. Tu excedente actual de {surplus}€ te permite batir a la inflación si lo inviertes.
                        </p>
                    </div>
                    <p className="text-[10px] text-center text-slate-300 font-bold uppercase tracking-widest">Sistemas de éxito • Moris & Fernández</p>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
