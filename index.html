<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abundancia PIR ✨</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [income, setIncome] = useState(1600);
            const [expenses, setExpenses] = useState({ coche: 450, casa: 200, ocio: 200, otros: 140 });
            const totalExp = useMemo(() => Object.values(expenses).reduce((a, b) => a + b, 0), [expenses]);
            const surplus = income - totalExp;

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [income, expenses]);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
                        {/* Header Inspirado en Moris */}
                        <div className="text-center mb-8">
                            <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">SISTEMA PIR <span className="text-indigo-600">✨</span></h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Mentalidad de Abundancia</p>
                        </div>

                        {/* Card Excedente */}
                        <div className="bg-indigo-50 rounded-3xl p-6 text-center mb-8 border border-indigo-100">
                            <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider mb-1">Excedente Mensual</p>
                            <p className="text-5xl font-black text-indigo-600 tracking-tighter">{surplus}€</p>
                        </div>

                        {/* Sliders de Control */}
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <div className="flex justify-between items-center">
                                    <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-tight">Ingresos (Sueldo PIR)</label>
                                    <span className="text-sm font-bold text-slate-900">{income}€</span>
                                </div>
                                <input type="range" min="1000" max="3000" step="50" value={income} onChange={(e) => setIncome(Number(e.target.value))} className="w-full h-2 bg-indigo-100 rounded-lg appearance-none accent-indigo-600 cursor-pointer" />
                            </div>

                            <div className="space-y-2">
                                <div className="flex justify-between items-center">
                                    <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-tight">Gastos Totales</label>
                                    <span className="text-sm font-bold text-slate-900">{totalExp}€</span>
                                </div>
                                <input type="range" min="0" max="1500" step="10" value={totalExp} className="w-full h-2 bg-pink-100 rounded-lg appearance-none accent-pink-500 cursor-not-allowed opacity-50" disabled />
                            </div>
                        </div>

                        {/* Regla de Babilonia */}
                        <div className="mt-10 p-5 bg-emerald-50 rounded-3xl border border-emerald-100 relative overflow-hidden">
                            <div className="relative z-10">
                                <div className="flex items-center gap-2 mb-2">
                                    <i data-lucide="lightbulb" className="w-3 h-3 text-emerald-600"></i>
                                    <p className="text-[10px] font-black text-emerald-700 uppercase tracking-widest">Regla de Babilonia</p>
                                </div>
                                <p className="text-xs text-emerald-800 leading-relaxed italic">
                                    "Una décima parte de lo que ganas es tuya para conservarla". Debes invertir mínimo <span className="font-bold">{Math.round(income * 0.1)}€</span> cada mes.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Footer con Filosofía */}
                    <p className="mt-8 text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Menos es más • Moris & Fernández</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
