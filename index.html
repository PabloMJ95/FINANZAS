<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abundancia PIR ✨</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [ingresos, setIngresos] = React.useState(1600);
            const [gastos, setGastos] = React.useState(850);
            const excedente = ingresos - gastos;

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 font-sans">
                    <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md border-t-8 border-indigo-600">
                        <h1 className="text-2xl font-black text-indigo-900 text-center mb-2">SISTEMA PIR ✨</h1>
                        <p className="text-center text-slate-400 text-xs mb-6 uppercase tracking-widest font-bold">Mentalidad de Abundancia</p>
                        
                        <div className="space-y-6">
                            <div className="bg-indigo-50 p-4 rounded-2xl text-center">
                                <p className="text-xs font-bold text-indigo-400">EXCEDENTE MENSUAL</p>
                                <p className="text-4xl font-black text-indigo-600">{excedente}€</p>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 mb-1">INGRESOS (SUELDO PIR)</label>
                                    <input type="range" min="1000" max="3000" step="50" value={ingresos} onChange={(e) => setIngresos(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none accent-indigo-600" />
                                    <p className="text-right text-sm font-bold mt-1 text-slate-700">{ingresos}€</p>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 mb-1">GASTOS TOTALES</label>
                                    <input type="range" min="0" max="1500" step="10" value={gastos} onChange={(e) => setGastos(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none accent-pink-500" />
                                    <p className="text-right text-sm font-bold mt-1 text-slate-700">{gastos}€</p>
                                </div>
                            </div>

                            <div className="p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                                <p className="text-[10px] font-black text-emerald-700 uppercase mb-1">💡 Regla de Babilonia</p>
                                <p className="text-xs text-emerald-600 italic leading-relaxed">
                                    "Una décima parte de lo que ganas es tuya para conservarla". Debes invertir mínimo <b>{Math.round(ingresos*0.1)}€</b> cada mes.
                                </p>
                            </div>
                        </div>
                    </div>
                    <p className="mt-8 text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Menos es más • Moris & Fernández</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
